---
# Environment axis. A demo is chosen by extra-var / CI matrix; an environment
# by inventory group. Two environments only — see docs/plan for why there is
# deliberately no "golden" env (that is a git tag, not a connection target).
all:
  children:
    aap:
      children:
        sandbox:   # the RHDP env you are actively building against
          hosts:
            localhost:
              ansible_connection: local
        demo:      # the RHDP env you show customers
          hosts:
            localhost:
              ansible_connection: local
